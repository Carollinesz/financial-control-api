services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: financial_api_V1
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${USERNAME_API}:${USERNAME_PASSWORD}@db:${DB_PORT}/financial_api_V1
      MIGRATION_DATABASE_URL: ${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${DB_PORT}/financial_api_V1
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
